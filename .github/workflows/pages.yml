name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'README.md'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend when available
        shell: bash
        run: |
          if [ -f frontend/package.json ]; then
            pnpm build:frontend
            mkdir -p _site
            cp -R frontend/dist/. _site/
          else
            mkdir -p _site
            cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="zh-CN">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>TWICE Discography</title>
              <style>
                body { margin: 0; font-family: system-ui, sans-serif; color: #111827; background: #f8fafc; }
                main { max-width: 760px; margin: 12vh auto; padding: 0 24px; }
                h1 { font-size: 40px; margin: 0 0 16px; }
                p { font-size: 18px; line-height: 1.7; color: #475569; }
              </style>
            </head>
            <body>
              <main>
                <h1>TWICE Discography</h1>
                <p>GitHub Pages deployment is ready. The frontend package has not been scaffolded yet, so this fallback page is shown until frontend/package.json exists.</p>
              </main>
            </body>
          </html>
          HTML
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
