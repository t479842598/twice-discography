name: Deploy Backend

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.7.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prod=false

      - name: Build on GitHub runner
        run: |
          pnpm --filter frontend build
          pnpm --filter backend build
          cp backend/src/db/schema.sql backend/dist/db/schema.sql

      - name: Pack runtime artifact
        run: |
          mkdir -p deploy-runtime/backend deploy-runtime/frontend deploy-package
          cp package.json pnpm-lock.yaml pnpm-workspace.yaml deploy-runtime/
          cp backend/package.json deploy-runtime/backend/
          cp -a backend/dist deploy-runtime/backend/dist
          cp -a backend/public deploy-runtime/backend/public
          cp -a frontend/dist deploy-runtime/frontend/dist
          tar -czf deploy-package/twice-discography.tar.gz -C deploy-runtime .
          du -h deploy-package/twice-discography.tar.gz

      - name: Upload package
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: deploy-package/twice-discography.tar.gz
          target: /www/wwwroot/
          strip_components: 1

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            cd /www/wwwroot

            APP_DIR=/www/wwwroot/twice-discography
            NEW_DIR=/www/wwwroot/twice-discography-new
            BACKUP_DIR=/www/wwwroot/twice-discography-backup

            rm -rf twice-discography-new
            mkdir -p twice-discography-new
            tar -xzf twice-discography.tar.gz -C twice-discography-new

            if [ -f "$APP_DIR/.env" ]; then
              cp "$APP_DIR/.env" "$NEW_DIR/.env"
            fi

            mkdir -p "$NEW_DIR/data"
            if [ -d "$APP_DIR/data" ]; then
              cp -a "$APP_DIR/data/." "$NEW_DIR/data/"
            fi

            cd "$NEW_DIR"
            corepack enable || true
            corepack prepare pnpm@9.7.0 --activate || true
            pnpm --filter backend install --frozen-lockfile --prod --registry=https://registry.npmmirror.com

            cd /www/wwwroot
            rm -rf "$BACKUP_DIR"
            if [ -d "$APP_DIR" ]; then
              mv "$APP_DIR" "$BACKUP_DIR"
            fi

            mv "$NEW_DIR" "$APP_DIR"

            cd "$APP_DIR"
            pm2 restart twice-backend --update-env
            pm2 save


