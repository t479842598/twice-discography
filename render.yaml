# Render 部署配置文件
# 文档：https://render.com/docs/blueprint-spec

services:
  - type: web
    name: twice-api
    runtime: node
    region: singapore
    plan: free
    branch: main
    buildCommand: npm install -g pnpm@9.7.0 && pnpm install --frozen-lockfile --prod=false && pnpm build:backend
    startCommand: pnpm --filter backend start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: NODE_ENV
        value: production
      - key: BACKEND_PORT
        value: 10000
      - key: BACKEND_HOST
        value: 0.0.0.0
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/twice.db
      - key: SERVE_FRONTEND
        value: false
      - key: STATIC_PREFIX
        value: /static
      # 以下两个变量需要在 Render 控制台手动填写前端 URL
      - key: FRONTEND_ORIGIN
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: MUSIC_R2_CACHE_ENABLED
        value: 'true'
      - key: MUSIC_R2_CACHE_MISS_MODE
        value: 'background'
      - key: MUSIC_R2_MIN_AUDIO_BYTES
        value: '16384'
      - key: MUSIC_R2_MAX_BYTES
        value: '9126805504'
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: twice-music-assets
      - key: R2_PUBLIC_BASE_URL
        value: https://cdn2.479842598.xyz
      - key: ADMIN_DEFAULT_PASSWORD
        sync: false
      - key: BILI_CREDENTIAL_ENCRYPTION_KEY
        sync: false
      - key: MV_PROXY_SIGNING_SECRET
        sync: false
      - key: MV_PROXY_BASE_URL
        sync: false
